<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="/dashboard">🍔 Smart Food Admin</a>

        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/add-food">Add Food</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/food-list">Food List</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/customers">Customers</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin-orders">Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning" href="/">Logout</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Add Food Form -->

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="form-box">

                <h2 class="text-center mb-4">🍕 Add New Food</h2>

                <form method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Food Name</label>
                        <input type="text" name="food_name" class="form-control" placeholder="Enter Food Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" name="category" class="form-control" placeholder="Enter Category" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" name="price" class="form-control" placeholder="Enter Price" required>
                    </div>

                    <div class="mb-3">
<label class="form-label">Image URL</label>

<input
type="text"
name="image"
class="form-control"
placeholder="Paste Image URL">

</div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-orange">
                            Add Food
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<footer>
    <p class="text-center py-3 mb-0">
        © 2026 Smart Food Order System
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
