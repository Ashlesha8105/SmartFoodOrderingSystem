<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="/dashboard">
            🍔 Smart Food Admin
        </a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/add-food">Add Food</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/food-list">Food List</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/customers">Customers</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin-orders">Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning" href="/">Logout</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Edit Food -->

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    ✏️ Edit Food
                </h2>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Food Name</label>

                        <input
                            type="text"
                            name="food_name"
                            class="form-control"
                            value="{{ food.food_name }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>

                        <input
                            type="text"
                            name="category"
                            class="form-control"
                            value="{{ food.category }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>

                        <input
                            type="number"
                            name="price"
                            class="form-control"
                            value="{{ food.price }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Image URL</label>

                        <input
                            type="text"
                            name="image"
                            class="form-control"
                            value="{{ food.image }}"
                            required>
                    </div>

                    <div class="d-grid gap-2">

                        <button type="submit" class="btn btn-warning">
                            Update Food
                        </button>

                        <a href="/food-list" class="btn btn-secondary">
                            Back
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->

<footer class="mt-5">
    <p class="text-center py-3 mb-0">
        © 2026 Smart Food Order System
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
