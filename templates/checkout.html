<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="/">🍔 Smart Food</a>

        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item"><a class="nav-link" href="/menu">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
                <li class="nav-item"><a class="nav-link active" href="/checkout">Checkout</a></li>
                <li class="nav-item"><a class="nav-link" href="/orders">My Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="/login">Logout</a></li>

            </ul>

        </div>

    </div>
</nav>

<!-- Checkout Section -->

<div class="container mt-5">

    <h2 class="text-center mb-4">💳 Checkout</h2>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="form-box">

                <h4 class="mb-3">Delivery Details</h4>

                <form action="/place_order" method="POST">

                    <div class="mb-3">
                       <label class="form-label">Full Name</label>
                       <input type="text" class="form-control" name="name" placeholder="Enter Name" required>
                    </div>

                    <div class="mb-3">
                       <label class="form-label">Mobile Number</label>
                       <input type="text" class="form-control" name="phone" placeholder="Enter Mobile Number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" rows="3" name="address" placeholder="Enter Delivery Address" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Payment Method</label>
                       <select class="form-control" name="payment">
                          <option>Cash on Delivery</option>
                          <option>Online Payment</option>
                       </select>
                    </div>

                    <hr>

                    <h5>Total Amount: ₹{{ total }}</h5>

                    <input type="hidden" name="total" value="{{ total }}">

                    <div class="d-grid mt-3">
                      <button type="submit" class="btn btn-orange btn-lg">
                               Place Order
                       </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<footer>
    <p class="text-center py-3 mb-0">
        © 2026 Smart Food Order System
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
